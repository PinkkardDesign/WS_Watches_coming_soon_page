<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>WS Watches - Coming Soon</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Background Video-->
       <video class="bg-video" autoplay muted loop playsinline webkit-playsinline>
             <source src="assets/mp4/download.mp4" type="video/mp4" />
            </video>
        <!-- Masthead-->
       <div class="masthead">
      <div class="masthead-content text-white">
        <div class="container-fluid px-4 px-lg-0">

            <!-- Logo -->
            <img src="assets/img/logo_nobg.png" alt="WS Watches Logo" class="ws-logo">

           <h1 class="hero-title lh-1 mb-2">
               Precision in Motion
                </h1>

                <div class="gold-divider"></div>

                <p class="hero-text mb-4">
                    WS Watches is a design-driven horology brand dedicated to the art of the custom timepiece.
                </p>

                <p class="hero-text mb-5">
                    Founded on structural integrity, modern minimalism, and reliable engineering, our first collection is currently in development.
                </p>

                <p class="launch-text">
                    Our first collection is launching soon.
                </p>
                    <!-- * * * * * * * * * * * * * * *-->
                    <!-- * * SB Forms Contact Form * *-->
                    <!-- * * * * * * * * * * * * * * *-->
                    <!-- This form is pre-integrated with SB Forms.-->
                    <!-- To make this form functional, sign up at-->
                    <!-- https://startbootstrap.com/solution/contact-forms-->
                    <!-- to get an API token!-->
                    <form name="waitlist" method="POST" data-netlify="true" netlify-honeypot="bot-field">
                            <input type="hidden" name="form-name" value="waitlist">

                            <p class="d-none">
                                <label>Don’t fill this out if you’re human: <input name="bot-field"></label>
                            </p>

                            <div class="row input-group-newsletter">
                                <div class="col">
                                    <input 
                                        class="form-control" 
                                        id="email" 
                                        name="email"
                                        type="email" 
                                        placeholder="Enter email address..." 
                                        aria-label="Enter email address..." 
                                        required>
                                </div>

                                <div class="col-auto">
                                    <button class="btn btn-primary" id="submitButton" type="submit">
                                        Join the Waitlist
                                    </button>
                                </div>
                            </div>
                        </form>
                </div>
            </div>
        </div>
        <!-- Social Icons-->
        <!-- For more icon options, visit https://fontawesome.com/icons?d=gallery&p=2&s=brands-->
        <div class="social-icons">
            <div class="d-flex flex-row flex-lg-column justify-content-center align-items-center h-100 mt-3 mt-lg-0">
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-twitter"></i></a>
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-facebook-f"></i></a>
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
        <!-- * *                               SB Forms JS                               * *-->
        <!-- * * Activate your form at https://startbootstrap.com/solution/contact-forms * *-->
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
    </body>
</html>
